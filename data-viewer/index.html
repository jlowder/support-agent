<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Data Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            /* Color palette - deep, modern, with vibrant accents */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            
            --accent-blue: #58a6ff;
            --accent-green: #2ea043;
            --accent-purple: #bc8cff;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            
            --border-subtle: #30363d;
            --border-emphasis: #8b949e;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.16);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Space Grotesk', 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header with modern glassmorphism feel */
        header {
            background: linear-gradient(135deg, #1a1f2e 0%, #141923 100%);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 32px 40px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-green));
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e6edf3 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        /* Stats dashboard - modern cards with subtle gradients */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            border-color: var(--border-emphasis);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-blue), transparent); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-purple), transparent); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-green), transparent); }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 0.01em;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .stat-card .value.small { font-size: 1.75rem; }

        /* Controls bar - sleek and minimal */
        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            min-width: 200px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        select {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            outline: none;
            font-family: var(--font-body);
        }

        select:hover {
            border-color: var(--accent-blue);
        }

        select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        button {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            font-family: var(--font-body);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-blue);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
            border: none;
            color: white;
        }

        button.primary:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: var(--shadow-md);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--accent-blue);
            font-size: 0.85rem;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-left: 4px;
        }

        .copy-btn:hover {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
        }

        .copy-btn.copied {
            background: rgba(46, 160, 67, 0.15);
            color: var(--accent-green);
        }

        .search-container {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 40px 10px 44px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all var(--transition-fast);
            outline: none;
        }

        .search-container input::placeholder {
            color: var(--text-muted);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Customer tree - modern, clean cards */
        .customers-tree {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .customer-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .customer-section:hover {
            border-color: var(--border-emphasis);
            box-shadow: var(--shadow-sm);
        }

        .customer-header {
            background: linear-gradient(135deg, #1a1f2e 0%, #141923 100%);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background var(--transition-normal);
            border-bottom: 1px solid var(--border-subtle);
        }

        .customer-header:hover {
            background: linear-gradient(135deg, #21262d 0%, #1a1f2e 100%);
        }

        .customer-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .customer-name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loyalty-badge {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(188, 140, 255, 0.15);
            color: var(--accent-purple);
            font-weight: 500;
        }

        .customer-contact {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .customer-contact span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .customer-content {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-normal) ease-out, padding var(--transition-normal) ease-out;
        }

        .customer-section.expanded .customer-content {
            max-height: 5000px;
            padding: 24px;
        }

        .toggle-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 1rem;
            transition: transform var(--transition-normal);
            background: rgba(88, 166, 255, 0.1);
            border-radius: 6px;
        }

        .customer-section.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        /* Orders list */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .order-card:hover {
            border-color: var(--accent-blue);
        }

        .order-card.has-return {
            border-left: 3px solid var(--accent-yellow);
        }

        .order-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .order-header:hover {
            background: rgba(88, 166, 255, 0.08);
        }

        .order-id {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .meta-item .label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .meta-item .value {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-pending { background: rgba(210, 153, 34, 0.15); color: var(--accent-yellow); border: 1px solid rgba(210, 153, 34, 0.3); }
        .status-processing { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); border: 1px solid rgba(88, 166, 255, 0.3); }
        .status-shipped { background: rgba(46, 160, 160, 0.15); color: #2dd4bf; border: 1px solid rgba(46, 160, 160, 0.3); }
        .status-delivered { background: rgba(46, 160, 67, 0.15); color: var(--accent-green); border: 1px solid rgba(46, 160, 67, 0.3); }
        .status-cancelled { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); border: 1px solid rgba(248, 81, 73, 0.3); }

        .order-content {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-normal) ease-out, padding var(--transition-normal) ease-out;
        }

        .order-card.expanded .order-content {
            max-height: 5000px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* Items list */
        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px 0;
        }

        .item-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            transition: all var(--transition-fast);
            position: relative;
        }

        .item-card:hover {
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-sm);
        }

        .item-card.digital { border-left: 3px solid var(--accent-blue); }
        .item-card.physical { border-left: 3px solid var(--accent-green); }
        .item-card.has-return { border-left: 3px solid var(--accent-yellow); }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .item-header:hover {
            background: rgba(88, 166, 255, 0.08);
            border-radius: 6px;
        }

        .item-name {
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-type-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            font-weight: 500;
            text-transform: uppercase;
        }

        .item-type-badge.physical {
            background: rgba(46, 160, 67, 0.1);
            color: var(--accent-green);
        }

        .item-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-normal) ease-out;
            margin-top: 0;
        }

        .item-card.expanded .item-content {
            max-height: 5000px;
            margin-top: 12px;
        }

        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .item-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .detail-item .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .detail-item .value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Return Requests Section */
        .return-requests-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .section-title {
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .section-title:hover {
            color: var(--accent-yellow);
        }

        .section-title .toggle-icon {
            font-size: 12px;
            transition: transform var(--transition-fast);
            padding: 4px;
            border-radius: 4px;
            background: rgba(210, 153, 34, 0.1);
            color: var(--accent-yellow);
        }

        .section-title .toggle-icon {
            transform: rotate(-90deg);
        }

        .section-title .toggle-icon.open {
            transform: rotate(0deg);
        }

        .return-requests-list {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height var(--transition-normal);
        }

        .return-requests-list.collapsed {
            max-height: 0;
        }

        .return-request-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all var(--transition-fast);
        }

        .return-request-card:hover {
            border-color: var(--accent-yellow);
        }

        .return-request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .request-status {
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-pending { background: rgba(210, 153, 34, 0.15); color: var(--accent-yellow); border: 1px solid rgba(210, 153, 34, 0.3); }
        .status-processing { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); border: 1px solid rgba(88, 166, 255, 0.3); }
        .status-approved { background: rgba(46, 160, 67, 0.15); color: var(--accent-green); border: 1px solid rgba(46, 160, 67, 0.3); }
        .status-denied { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); border: 1px solid rgba(248, 81, 73, 0.3); }
        .status-completed { background: rgba(188, 140, 255, 0.15); color: var(--accent-purple); border: 1px solid rgba(188, 140, 255, 0.3); }

        .request-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .return-request-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .return-request-details .detail-item {
            margin-bottom: 5px;
        }

        .return-request-details .detail-item .label {
            font-weight: 500;
            color: var(--text-secondary);
            margin-right: 6px;
            font-size: 0.8rem;
        }

        .no-requests {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 12px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-primary);
            font-size: 1.2rem;
        }

        .empty-state p {
            color: var(--text-muted);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* CORS Warning */
        .cors-warning {
            background: rgba(210, 153, 34, 0.1);
            border: 1px solid rgba(210, 153, 34, 0.3);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            margin-bottom: 24px;
            color: var(--accent-yellow);
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cors-warning strong {
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 24px; }
            header h1 { font-size: 1.75rem; }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                width: 100%;
            }
            
            .order-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .order-meta {
                justify-content: center;
                width: 100%;
            }
            
            .meta-item {
                width: 100%;
                justify-content: center;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CRM Data Viewer</h1>
            <p>
                <span class="header-badge">DATA VIEWER</span>
                Customer Orders & Items — Read-Only Access
            </p>
        </header>

        <div class="cors-warning" id="cors-warning">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <strong>CORS Warning:</strong> The data viewer is running in a browser context.
            For best results, open this file via a local web server.
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Customers</h3>
                <div class="value" id="total-customers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="value" id="total-orders">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Items</h3>
                <div class="value small" id="total-items">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search customers, orders, or items...">
            </div>

            <div class="control-group">
                <label for="status-filter">Status</label>
                <select id="status-filter">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>

            <div class="control-group">
                <label for="return-status-filter">Returns</label>
                <select id="return-status-filter">
                    <option value="all">All Returns</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="approved">Approved</option>
                    <option value="denied">Denied</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <button id="load-data-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Reload Data
            </button>
        </div>

        <div id="customers-tree" class="customers-tree">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <script>
        // State
        let customers = [];
        let filteredCustomers = [];

        // DOM Elements
        const customersTreeEl = document.getElementById('customers-tree');
        const searchInput = document.getElementById('search-input');
        const statusFilter = document.getElementById('status-filter');
        const returnStatusFilter = document.getElementById('return-status-filter');
        const loadBtn = document.getElementById('load-data-btn');
        const corsWarning = document.getElementById('cors-warning');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.protocol === 'file:') {
                corsWarning.style.display = 'flex';
            }

            loadFromPossibleLocations();
            setupEventListeners();
        });

        function setupEventListeners() {
            searchInput.addEventListener('input', filterCustomers);
            statusFilter.addEventListener('change', filterCustomers);
            returnStatusFilter.addEventListener('change', filterCustomers);
            loadBtn.addEventListener('click', loadFromPossibleLocations);

            // Delegated click handler for expansion toggle
            document.addEventListener('click', (e) => {
                // Don't expand on click inside buttons or links
                if (e.target.closest('button') || e.target.closest('a')) {
                    return;
                }

                const header = e.target.closest('.customer-header, .order-header, .item-header, .section-title');
                if (!header) return;

                const section = header.closest('.customer-section, .order-card, .item-card');
                if (section) {
                    section.classList.toggle('expanded');
                } else {
                    const title = header.closest('.section-title');
                    if (title) {
                        title.classList.toggle('collapsed');
                        title.nextElementSibling?.classList.toggle('collapsed');
                        title.querySelector('.toggle-icon')?.classList.toggle('open');
                    }
                }
            });
        }

        async function loadFromPossibleLocations() {
            const locations = [
                'local_crm.json',
                '../local_crm.json',
                './data-viewer/local_crm.json',
                'data-viewer/local_crm.json'
            ];

            let loaded = false;

            for (const location of locations) {
                try {
                    console.log(`Attempting to load from: ${location}`);
                    const response = await fetch(location);
                    if (response.ok) {
                        const data = await response.json();
                        customers = data.customers || [];
                        filteredCustomers = [...customers];
                        updateStats();
                        renderCustomers();
                        corsWarning.style.display = 'none';
                        loaded = true;
                        console.log(`Successfully loaded data from: ${location}`);
                        break;
                    }
                } catch (error) {
                    console.log(`Failed to load from ${location}: ${error.message}`);
                    continue;
                }
            }

            if (!loaded) {
                customersTreeEl.innerHTML = `
                    <div class="cors-warning">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <div>
                            <h3>Cannot Load Data</h3>
                            <p style="margin-top: 4px; color: var(--text-secondary);">The local_crm.json file could not be loaded.</p>
                            <p style="margin-top: 8px; color: var(--text-muted); font-size: 0.9rem;">Open this HTML file via a local web server to view customer data.</p>
                        </div>
                    </div>
                `;
            }
        }

        function updateStats() {
            const totalCustomers = customers.length;
            const totalOrders = customers.reduce((sum, customer) => sum + customer.order_history.length, 0);
            const totalItems = customers.reduce((sum, customer) => 
                sum + customer.order_history.reduce((orderSum, order) => 
                    orderSum + order.items.length, 0), 0);

            animateValue('total-customers', totalCustomers);
            animateValue('total-orders', totalOrders);
            animateValue('total-items', totalItems);
        }

        function animateValue(elementId, value) {
            const element = document.getElementById(elementId);
            const start = 0;
            const duration = 600;
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOutCubic = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (value - start) * easeOutCubic);

                element.textContent = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    element.textContent = value.toLocaleString();
                }
            }

            requestAnimationFrame(animate);
        }

        function filterCustomers() {
            const searchTerm = searchInput.value.toLowerCase();
            // Normalize status values to lowercase for comparison
            const statusValue = statusFilter.value.toLowerCase();
            const returnStatusValue = returnStatusFilter.value.toLowerCase();

            filteredCustomers = customers.filter(customer => {
                if (searchTerm) {
                    const customerMatch = 
                        customer.name.toLowerCase().includes(searchTerm) ||
                        customer.email.toLowerCase().includes(searchTerm) ||
                        customer.id.toLowerCase().includes(searchTerm) ||
                        (customer.loyalty_tier && customer.loyalty_tier.toLowerCase().includes(searchTerm));

                    const orderMatch = customer.order_history.some(order => {
                        // Compare lowercase values
                        if (statusValue !== 'all' && order.status.toLowerCase() !== statusValue) {
                            return false;
                        }

                        if (returnStatusValue !== 'all') {
                            const hasMatchingReturn = order.items.some(item =>
                                item.return_requests && item.return_requests.some(req =>
                                    req.status.toLowerCase() === returnStatusValue
                                )
                            );
                            if (!hasMatchingReturn) {
                                return false;
                            }
                        }

                        const orderMatch = order.order_id.toLowerCase().includes(searchTerm);
                        const itemMatch = order.items.some(item =>
                            item.name.toLowerCase().includes(searchTerm) ||
                            item.category.toLowerCase().includes(searchTerm) ||
                            (item.return_requests && item.return_requests.some(req =>
                                req.reason.toLowerCase().includes(searchTerm) ||
                                req.status.toLowerCase().includes(searchTerm) ||
                                (req.refund_amount && String(req.refund_amount).includes(searchTerm))
                            ))
                        );

                        return orderMatch || itemMatch;
                    });

                    if (!customerMatch && !orderMatch) {
                        return false;
                    }
                } else {
                    if (statusValue !== 'all') {
                        const hasMatchingOrders = customer.order_history.some(order => 
                            order.status.toLowerCase() === statusValue
                        );
                        return hasMatchingOrders;
                    }

                    if (returnStatusValue !== 'all') {
                        const hasMatchingReturns = customer.order_history.some(order =>
                            order.items.some(item =>
                                item.return_requests && item.return_requests.some(req =>
                                    req.status.toLowerCase() === returnStatusValue
                                )
                            )
                        );
                        return hasMatchingReturns;
                    }
                }

                return true;
            });

            renderCustomers();
        }

        function renderCustomers() {
            customersTreeEl.innerHTML = '';

            if (filteredCustomers.length === 0) {
                customersTreeEl.innerHTML = `
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <h3>No customers found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                return;
            }

            filteredCustomers.forEach(customer => {
                const customerSection = createCustomerSection(customer);
                customersTreeEl.appendChild(customerSection);
            });
        }

        function createCustomerSection(customer) {
            const section = document.createElement('div');
            section.className = 'customer-section';
            section.dataset.id = customer.id;

            const customerContent = document.createElement('div');
            customerContent.className = 'customer-content';
            customerContent.innerHTML = createOrdersList(customer.order_history || []);

            section.innerHTML = `
                <div class="customer-header">
                    <div class="customer-info">
                        <div class="customer-name">
                            ${escapeHtml(customer.name)}
                            <span class="loyalty-badge">${getLoyaltyBadge(customer.loyalty_tier)}</span>
                        </div>
                        <div class="customer-contact">
                            <span>
                                ${escapeHtml(customer.email)}
                                <button class="copy-btn" data-field="email" data-value="${escapeHtml(customer.email)}" title="Copy email to clipboard">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </span>
                            <span>• ${escapeHtml(customer.id)}</span>
                            <button class="copy-btn" data-field="id" data-value="${escapeHtml(customer.id)}" title="Copy user ID to clipboard">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <span>• ${escapeHtml(customer.address)}</span>
                        </div>
                    </div>
                    <div class="toggle-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
            `;
            section.appendChild(customerContent);

            // Attach click handlers to copy buttons after rendering
            section.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    copyToClipboard(btn);
                });
            });

            return section;
        }

        function getLoyaltyBadge(tier) {
            const badges = {
                'gold': '🥇 Gold',
                'silver': '🥈 Silver',
                'bronze': '🥉 Bronze',
                'standard': '⭐ Standard'
            };
            const normalized = (tier || 'standard').toLowerCase();
            return badges[normalized] || '⭐ Standard';
        }

        function createOrdersList(ordersList) {
            if (ordersList.length === 0) {
                return '<p class="empty-state" style="margin: 24px 0; padding: 30px;">No orders</p>';
            }

            const list = document.createElement('ul');
            list.className = 'orders-list';

            ordersList.forEach(order => {
                const li = document.createElement('li');
                li.className = `order-card ${order.return_requests?.some(item => item.return_requests?.length > 0) ? 'has-return' : ''}`;
                li.dataset.id = order.order_id;

                li.innerHTML = `
                    <div class="order-header">
                        <div>
                            <span class="order-id">
                                ${order.order_id}
                            </span>
                        </div>
                        <div class="order-meta">
                            <div class="meta-item">
                                <span class="label">Date</span>
                                <span class="value">${formatDate(order.order_date)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="label">Total</span>
                                <span class="value">${formatCurrency(order.total_amount)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="label">Status</span>
                                <span class="status-badge status-${order.status.toLowerCase()}">${capitalizeStatus(order.status)}</span>
                            </div>
                        </div>
                        <div class="toggle-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <div class="order-content">
                        ${createItemsList(order.items)}
                    </div>
                `;

                list.appendChild(li);
            });

            return list.outerHTML;
        }

        function createItemsList(items) {
            if (items.length === 0) {
                return '<p class="empty-state" style="margin: 24px 0; padding: 20px;">No items</p>';
            }

            const list = document.createElement('ul');
            list.className = 'items-container';

            items.forEach(item => {
                const li = document.createElement('li');
                li.className = `item-card ${item.item_type === 'Digital' ? 'digital' : 'physical'} ${item.return_requests?.length > 0 ? 'has-return' : ''}`;
                li.dataset.id = item.item_id;

                li.innerHTML = `
                    <div class="item-header">
                        <div class="item-name">
                            ${escapeHtml(item.name)}
                            <span class="item-type-badge ${item.item_type === 'Physical' ? 'physical' : ''}">${item.item_type}</span>
                        </div>
                        <div class="toggle-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <div class="item-content">
                        <div class="item-meta">
                            <span>Category: ${escapeHtml(item.category)}</span>
                            <span>Qty: ${item.quantity}</span>
                            <span>Price: ${formatCurrency(item.price)}</span>
                            <span>${item.is_opened ? 'Open' : 'Unopened'}</span>
                        </div>
                        <div class="item-details">
                            <div class="detail-item">
                                <span class="label">Item Total</span>
                                <span class="value">${formatCurrency(item.price * item.quantity)}</span>
                            </div>
                        </div>
                        ${item.return_requests && item.return_requests.length > 0 ? `
                            <div class="return-requests-section">
                                <div class="section-title collapsed" onclick="event.stopPropagation(); this.classList.toggle('collapsed'); this.nextElementSibling?.classList.toggle('collapsed'); this.querySelector('.toggle-icon')?.classList.toggle('open');">
                                    <span class="toggle-icon">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="6 9 12 15 18 9"></polyline>
                                        </svg>
                                    </span>
                                    <span>Return Requests (${item.return_requests.length})</span>
                                </div>
                                <div class="return-requests-list collapsed">
                                    ${item.return_requests.map(request => `
                                        <div class="return-request-card">
                                            <div class="return-request-header">
                                                <span class="request-status status-${request.status.toLowerCase()}">${capitalizeStatus(request.status)}</span>
                                                <span class="request-date">${formatDate(request.request_date)}</span>
                                            </div>
                                            <div class="return-request-details">
                                                <div class="detail-item">
                                                    <span class="label">Reason:</span> ${escapeHtml(request.reason)}
                                                </div>
                                                <div class="detail-item">
                                                    <span class="label">Refund:</span> ${formatCurrency(request.refunded_amount || request.refund_amount || 0)}
                                                </div>
                                                ${request.refund_date ? `
                                                    <div class="detail-item">
                                                        <span class="label">Refund Date:</span> ${formatDate(request.refund_date)}
                                                    </div>
                                                ` : ''}
                                                ${request.transaction_id ? `
                                                    <div class="detail-item">
                                                        <span class="label">Transaction ID:</span> ${escapeHtml(request.transaction_id)}
                                                    </div>
                                                ` : ''}
                                                <div class="detail-item">
                                                    <span class="label">Restocking Fee:</span> ${request.restocking_fee_applied ? 'Applied' : 'None'}
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;

                list.appendChild(li);
            });

            return list.outerHTML;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function capitalizeStatus(text) {
            if (!text) return '';
            return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
        }

        function copyToClipboard(button) {
            const value = button.getAttribute('data-value');
            const field = button.getAttribute('data-field');

            navigator.clipboard.writeText(value).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                button.classList.add('copied');

                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                const tooltip = document.createElement('div');
                tooltip.textContent = 'Failed to copy';
                tooltip.style.position = 'absolute';
                tooltip.style.background = '#f85149';
                tooltip.style.color = 'white';
                tooltip.style.padding = '4px 8px';
                tooltip.style.borderRadius = '4px';
                tooltip.style.fontSize = '0.75rem';
                tooltip.style.top = '100%';
                tooltip.style.marginTop = '4px';
                tooltip.style.left = '50%';
                tooltip.style.transform = 'translateX(-50%)';
                tooltip.style.zIndex = '1000';
                document.body.appendChild(tooltip);

                setTimeout(() => tooltip.remove(), 2000);
            });
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        }
    </script>
</body>
