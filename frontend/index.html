<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container {
            height: calc(100vh - 160px);
        }
        .message-bubble {
            max-width: 80%;
        }
        /* Toggle Switch Styles */
        #voice-toggle:checked + .block {
            background: #4ade80;
        }
        #voice-toggle:checked + .block + .absolute {
            transform: translateX(16px);
        }
        .voice-indicator {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex flex-col h-screen max-w-4xl mx-auto p-4">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6 bg-white p-4 rounded-xl shadow-sm">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                    AI
                </div>
                <div>
                    <h1 class="text-lg font-semibold text-gray-800">Support Agent</h1>
                    <p class="text-xs text-green-500 flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span> Online
                    </p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <label class="flex items-center cursor-pointer space-x-2">
                    <div class="relative">
                        <input type="checkbox" id="voice-toggle" class="sr-only" checked>
                        <div class="block w-10 h-6 bg-gray-300 rounded-full"></div>
                        <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform transform translate-x-0"></div>
                    </div>
                    <span class="text-sm text-gray-700 font-medium">Voice Output</span>
                </label>
                <button id="new-session-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors text-sm font-medium">
                    New Session
                </button>
                <div class="text-sm text-gray-500">
                    Customer Portal
                </div>
            </div>
        </header>

        <!-- Chat Interface -->
        <main class="flex-1 flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden">
            <div id="chat-window" class="chat-container overflow-y-auto p-6 space-y-4">
                <!-- Initial Bot Message -->
                <div class="flex justify-start">
                    <div class="message-bubble bg-gray-200 text-gray-800 p-3 rounded-2xl rounded-tl-none">
                        Hello! I'm your AI Support Assistant. How can I help you today?
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-gray-100 bg-gray-50">
                <form id="chat-form" class="flex items-center space-x-3">
                    <button type="button" id="mic-btn" class="p-3 bg-gray-200 text-gray-600 rounded-full hover:bg-blue-100 hover:text-blue-600 transition-colors" title="Voice Input">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                    <input type="text" id="user-input" placeholder="Type your message..." class="flex-1 p-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <button type="submit" class="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const newSessionBtn = document.getElementById('new-session-btn');
        const voiceToggle = document.getElementById('voice-toggle');
        const BACKEND_URL = 'http://localhost:8050';
        const KOKORO_API_URL = 'http://katana:8025/v1/audio/speech';

        // Persist threadId across page refreshes
        let threadId = localStorage.getItem('support_thread_id');
        if (!threadId) {
            threadId = Math.random().toString(36).substring(7);
            localStorage.setItem('support_thread_id', threadId);
        }

        // Voice output state
        let voiceOutputEnabled = true;
        let currentAudio = null;

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble p-3 rounded-2xl ${
                isUser 
                ? 'bg-blue-600 text-white rounded-tr-none' 
                : 'bg-gray-200 text-gray-800 rounded-tl-none'
            }`;
            bubble.textContent = text;
            
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            // Announce agent messages if voice output is enabled
            if (!isUser && voiceOutputEnabled) {
                speakMessage(text);
            }
        }

        // Voice output using Kokoro TTS API
        async function speakMessage(text) {
            // Cancel any current audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            try {
                const response = await fetch(KOKORO_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'kokoro',
                        input: text,
                        voice: 'af_bella',  // Default female voice
                        response_format: 'mp3',
                        speed: 1.0,
                    }),
                });
                
                if (!response.ok) {
                    throw new Error(`TTS API error: ${response.status}`);
                }
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                currentAudio = new Audio(url);
                currentAudio.onended = () => {
                    URL.revokeObjectURL(url);
                    currentAudio = null;
                };
                currentAudio.onended = null;
                currentAudio.play().catch(err => {
                    console.error('Audio play error:', err);
                });
                
                // Revoke object URL after playback starts
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 1000);
                
            } catch (error) {
                console.error('Failed to speak message:', error);
                // Fallback to browser's native TTS
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        function clearChat() {
            chatWindow.innerHTML = '';
            // Add initial bot message
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bg-gray-200 text-gray-800 p-3 rounded-2xl rounded-tl-none';
            bubble.textContent = 'Hello! I\'m your AI Support Assistant. How can I help you today?';
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
        }

        async function sendMessage(text) {
            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        thread_id: threadId
                    }),
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error('Error sending message:', error);
                return `Sorry, I'm having trouble connecting to the server. Please try again later. (Error: ${error.message})`;
            }
        }

        function startNewSession() {
            // Cancel any current audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            // Generate new thread ID
            threadId = Math.random().toString(36).substring(7);
            localStorage.setItem('support_thread_id', threadId);
            
            // Clear chat UI
            clearChat();
            
            console.log('New session started with thread_id:', threadId);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, true);
            userInput.value = '';

            // Show typing indicator
            const typingWrapper = document.createElement('div');
            typingWrapper.className = 'flex justify-start';
            typingWrapper.id = 'typing-indicator';
            typingWrapper.innerHTML = `<div class="message-bubble bg-gray-200 text-gray-500 p-3 rounded-2xl rounded-tl-none italic">Agent is thinking...</div>`;
            chatWindow.appendChild(typingWrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const botResponse = await sendMessage(message);
            
            // Remove typing indicator
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();

            appendMessage(botResponse);
        });

        // Voice toggle handler
        voiceToggle.addEventListener('change', (e) => {
            voiceOutputEnabled = e.target.checked;
            console.log('Voice output:', voiceOutputEnabled ? 'enabled' : 'disabled');
        });
        newSessionBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to start a new session? Your current conversation will be cleared.')) {
                startNewSession();
            }
        });
    </script>
</body>
</html>
