<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Trace Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .trace-entry {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .component-authenticate { border-left-color: #3b82f6; }
        .component-extract { border-left-color: #8b5cf6; }
        .component-list_orders { border-left-color: #06b6d4; }
        .component-check_policy { border-left-color: #f59e0b; }
        .component-process { border-left-color: #10b981; }
        .component-init { border-left-color: #6366f1; }
        .component-agent { border-left-color: #ec4899; }
        .component-tools { border-left-color: #14b8a6; }
        .component-routing { border-left-color: #f97316; }
        .component-error { border-left-color: #ef4444; }
        
        .payload-json {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .payload-key { color: #6b7280; }
        .payload-string { color: #10b981; }
        .payload-number { color: #3b82f6; }
        .payload-boolean { color: #f59e0b; }
        .payload-null { color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex flex-col h-screen max-w-7xl mx-auto p-4">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6 bg-white p-4 rounded-xl shadow-sm">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">
                    Admin
                </div>
                <div>
                    <h1 class="text-lg font-semibold text-gray-800">Admin Trace Console</h1>
                    <div class="flex items-center space-x-2">
                        <span class="text-xs text-gray-500">Status:</span>
                        <span class="text-xs font-medium px-2 py-1 rounded-full bg-green-100 text-green-700" id="connection-status">
                           Connecting...
                        </span>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <button id="clear-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors text-sm">
                    Clear Console
                </button>
                <button id="export-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors text-sm">
                    Export Logs
                </button>
            </div>
        </header>

        <!-- Trace Console -->
        <main class="flex-1 flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden">
            <div id="trace-window" class="flex-1 overflow-y-auto p-4 space-y-3 font-mono text-sm">
                <div class="text-gray-500 italic text-center py-8">
                    Waiting for trace events...<br>
                    Start a conversation to see trace logs
                </div>
            </div>
        </main>

        <!-- Stats Footer -->
        <footer class="mt-4 grid grid-cols-4 gap-4">
            <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase tracking-wider">Total Events</div>
                <div class="text-2xl font-bold text-indigo-600" id="total-events">0</div>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase tracking-wider">Components</div>
                <div class="text-2xl font-bold text-green-600" id="unique-components">0</div>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase tracking-wider">Errors</div>
                <div class="text-2xl font-bold text-red-600" id="error-count">0</div>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase tracking-wider">Last Event</div>
                <div class="text-sm font-medium text-gray-700 truncate" id="last-event-time">-</div>
            </div>
        </footer>
    </div>

    <script>
        const traceWindow = document.getElementById('trace-window');
        const connectionStatus = document.getElementById('connection-status');
        const clearBtn = document.getElementById('clear-btn');
        const exportBtn = document.getElementById('export-btn');
        
        let eventCount = 0;
        let errorCount = 0;
        let uniqueComponents = new Set();
        let allEvents = [];
        let eventSource = null;
        let isConnecting = false;
        let reconnectDelay = 5000; // Start with 5 second delay

        function updateStats() {
            document.getElementById('total-events').textContent = eventCount;
            document.getElementById('unique-components').textContent = uniqueComponents.size;
            document.getElementById('error-count').textContent = errorCount;
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                fractionalSecondDigits: 3
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightJson(obj, indent = 0) {
            if (obj === null || obj === undefined) {
                return '<span class="payload-null">null</span>';
            }
            
            if (typeof obj === 'string') {
                return `<span class="payload-string">"${escapeHtml(obj)}"</span>`;
            }
            
            if (typeof obj === 'number') {
                return `<span class="payload-number">${obj}</span>`;
            }
            
            if (typeof obj === 'boolean') {
                return `<span class="payload-boolean">${obj}</span>`;
            }
            
            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    return '[]';
                }
                let result = '[\n';
                obj.forEach((item, index) => {
                    result += ' '.repeat(indent + 2) + highlightJson(item, indent + 2);
                    if (index < obj.length - 1) {
                        result += ',';
                    }
                    result += '\n';
                });
                return result + ' '.repeat(indent) + ']';
            }
            
            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) {
                    return '{}';
                }
                let result = '{\n';
                keys.forEach((key, index) => {
                    result += ' '.repeat(indent + 2) + 
                              `<span class="payload-key">"${escapeHtml(key)}"</span>: ` + 
                              highlightJson(obj[key], indent + 2);
                    if (index < keys.length - 1) {
                        result += ',';
                    }
                    result += '\n';
                });
                return result + ' '.repeat(indent) + '}';
            }
            
            return String(obj);
        }

        function createTraceEntry(event) {
            const componentClass = `component-${event.component || 'unknown'}`;
            const isTrace = event.type === 'trace';
            const isError = event.message?.toLowerCase().includes('error') || 
                          event.type?.toLowerCase().includes('error') ||
                          (event.payload && (event.payload.error || event.payload.error_message));
            
            const isAgent = event.component === 'agent';
            const isTools = event.component === 'tools';
            
            const entry = document.createElement('div');
            entry.className = `trace-entry border-l-4 rounded-r-lg p-4 mb-2 ${componentClass} ${
                isError ? 'bg-red-50 border-red-500' : (isTrace ? 'bg-gray-50 border-gray-300' : 'bg-blue-50 border-blue-300')
            }`;
            
            const timestamp = formatTimestamp(event.timestamp);
            
            // Format component badge with title
            const componentTitle = event.component === 'agent' ? 'LLM Agent' : 
                                   event.component === 'tools' ? 'Tools' : 
                                   event.component === 'routing' ? 'Routing' : 
                                   event.component === 'process' ? 'Process' : 
                                   event.component === 'extract' ? 'Extract' : 
                                   event.component === 'authenticate' ? 'Auth' : 
                                   event.component === 'init' ? 'Init' : 
                                   event.component.charAt(0).toUpperCase() + event.component.slice(1);
            
            // Format message with emoji prefix
            const messagePrefix = isTools ? '⚙️ ' : (isAgent ? '🤖 ' : (isError ? '❌ ' : 'ℹ️ '));
            
            let payloadHtml = '';
            if (event.payload && Object.keys(event.payload).length > 0) {
                // Build detailed payload view based on component
                let payloadContent = '';
                
                if (isAgent && event.payload.content) {
                    payloadContent += `<div class="mb-2"><strong class="text-gray-700">LLM Response Content:</strong><div class="p-2 bg-blue-50 rounded border border-blue-200 mt-1">${escapeHtml(String(event.payload.content))}</div></div>`;
                }
                
                if (event.payload.tool_calls && Array.isArray(event.payload.tool_calls)) {
                    payloadContent += '<div class="mb-2"><strong class="text-gray-700">Tool Calls:</strong><ul class="mt-1 ml-4 space-y-1">';
                    event.payload.tool_calls.forEach((tc, idx) => {
                        const toolName = escapeHtml(tc.name || 'unknown');
                        payloadContent += `<li class="text-sm">
                            <span class="font-mono bg-blue-600 text-white px-2 py-0.5 rounded">${toolName}</span>
                            ${tc.id ? `<span class="text-xs text-gray-500 ml-2">(id: ${escapeHtml(String(tc.id))})</span>` : ''}
                            <div class="mt-1 p-1 bg-blue-50 rounded border border-blue-200">
                                <strong class="text-gray-600">Arguments:</strong>
                                <pre class="payload-json m-0">${highlightJson(tc.args || {})}</pre>
                            </div>
                        </li>`;
                    });
                    payloadContent += '</ul></div>';
                }
                
                if (isTools && event.payload.tool_results && Array.isArray(event.payload.tool_results)) {
                    payloadContent += '<div class="mb-2"><strong class="text-gray-700">Tool Results:</strong><ul class="mt-1 ml-4 space-y-2">';
                    event.payload.tool_results.forEach((tr, idx) => {
                        const toolName = escapeHtml(tr.name || 'unknown');
                        payloadContent += `<li class="text-sm">
                            <span class="font-mono bg-emerald-600 text-white px-2 py-0.5 rounded">${toolName}</span>
                            ${tr.tool_call_id ? `<span class="text-xs text-gray-500 ml-2">(tool_call_id: ${escapeHtml(String(tr.tool_call_id))})</span>` : ''}
                            <div class="mt-1 p-1 bg-emerald-50 rounded border border-emerald-200">
                                <strong class="text-gray-600">Result:</strong>
                                <pre class="payload-json m-0">${highlightJson(tr.content || tr)}</pre>
                            </div>
                        </li>`;
                    });
                    payloadContent += '</ul></div>';
                }
                
                if (event.payload.input_messages && Array.isArray(event.payload.input_messages)) {
                    payloadContent += '<div class="mb-2"><strong class="text-gray-700">Input Messages:</strong><ul class="mt-1 ml-4 space-y-1">';
                    event.payload.input_messages.forEach((msg, idx) => {
                        const role = msg.role || 'unknown';
                        const roleColor = role === 'system' ? 'purple' : (role === 'user' ? 'blue' : (role === 'assistant' ? 'green' : 'gray'));
                        payloadContent += `<li class="text-sm">
                            <span class="font-mono bg-${roleColor}-100 px-2 py-0.5 rounded text-${roleColor}-700">${escapeHtml(role)}</span>
                            <div class="mt-0.5 p-1 bg-white rounded border border-gray-200">
                                ${escapeHtml(String(msg.content))}
                            </div>
                        </li>`;
                    });
                    payloadContent += '</ul></div>';
                }
                
                if (event.payload.result_messages && Array.isArray(event.payload.result_messages)) {
                    payloadContent += '<div class="mb-2"><strong class="text-gray-700">Result Messages:</strong><ul class="mt-1 ml-4 space-y-1">';
                    event.payload.result_messages.forEach((msg, idx) => {
                        payloadContent += `<li class="text-sm">
                            <span class="font-mono bg-gray-100 px-2 py-0.5 rounded">${escapeHtml(String(msg.type || 'message'))}</span>
                            <div class="mt-0.5 p-1 bg-white rounded border border-gray-200">
                                ${escapeHtml(String(msg.content || msg))}
                            </div>
                        </li>`;
                    });
                    payloadContent += '</ul></div>';
                }
                
                if (event.payload.error || event.payload.error_message) {
                    payloadContent += `<div class="mb-2"><strong class="text-red-700">Error:</strong><div class="p-2 bg-red-100 rounded border border-red-300 mt-1 text-red-800 font-mono">${escapeHtml(String(event.payload.error || event.payload.error_message))}</div></div>`;
                }
                
                // Add remaining payload fields
                const otherFields = Object.entries(event.payload).filter(([key]) => 
                    !['content', 'tool_calls', 'tool_results', 'input_messages', 'result_messages', 'error', 'error_message'].includes(key)
                );
                
                if (otherFields.length > 0) {
                    payloadContent += '<div class="mb-2"><strong class="text-gray-700">Payload:</strong><div class="mt-1 p-2 bg-white rounded border border-gray-200">';
                    payloadContent += '<pre class="payload-json">' + highlightJson(Object.fromEntries(otherFields)) + '</pre>';
                    payloadContent += '</div></div>';
                }
                
                if (payloadContent) {
                    payloadHtml = `<div class="mt-2">${payloadContent}</div>`;
                }
            }
            
            entry.innerHTML = `
                <div class="flex items-start justify-between">
                    <div>
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="text-xs font-bold px-2 py-0.5 rounded bg-gray-200 text-gray-700">
                                ${escapeHtml(componentTitle)}
                            </span>
                            <span class="text-xs text-gray-500">[${timestamp}]</span>
                        </div>
                        <div class="text-gray-800 font-medium">${messagePrefix}${escapeHtml(event.message || 'No message')}</div>
                    </div>
                    ${isError ? '<span class="text-red-500 text-xs font-bold px-2 py-1 rounded bg-red-100">ERROR</span>' : ''}
                </div>
                ${payloadHtml}
            `;
            
            return entry;
        }

        function addTraceEvent(event) {
            // Track unique components
            if (event.component) {
                uniqueComponents.add(event.component);
            }
            
            // Track errors
            if (event.message?.toLowerCase().includes('error') || 
                event.type?.toLowerCase().includes('error') ||
                (event.payload && (event.payload.error || event.payload.error_message))) {
                errorCount++;
            }
            
            eventCount++;
            
            // Store event
            allEvents.push(event);
            
            // Update stats
            updateStats();
            
            // Update last event time
            document.getElementById('last-event-time').textContent = formatTimestamp(event.timestamp);
            
            // Remove placeholder if present
            const placeholder = traceWindow.querySelector('.text-gray-500');
            if (placeholder) {
                placeholder.remove();
            }
            
            // Add entry
            const entry = createTraceEntry(event);
            traceWindow.appendChild(entry);
            traceWindow.scrollTop = traceWindow.scrollHeight;
        }

        function connectToTraceStream() {
            // Don't reconnect if we're explicitly disconnected (reconnect button hasn't been pressed)
            if (!isConnecting) {
                console.log('Not reconnecting - connection intentionally closed');
                return;
            }
            
            connectionStatus.textContent = 'Connecting...';
            connectionStatus.className = 'text-xs font-medium px-2 py-1 rounded-full bg-yellow-100 text-yellow-700';
            
            const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
            const url = '/admin/trace'; // Use relative path to route through frontend server
            
            try {
                const es = new EventSource(url);
                
                es.onopen = () => {
                    console.log('SSE connection established');
                    connectionStatus.textContent = 'Connected';
                    connectionStatus.className = 'text-xs font-medium px-2 py-1 rounded-full bg-green-100 text-green-700';
                    // Reset delay on successful connection
                    reconnectDelay = 5000;
                };
                
                // Handle 'trace' events (named events from the SSE stream)
                es.addEventListener('trace', (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        addTraceEvent(data);
                    } catch (e) {
                        console.error('Failed to parse trace event:', e);
                    }
                });
                
                // Also handle default onmessage for any unnamed events
                es.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        addTraceEvent(data);
                    } catch (e) {
                        console.error('Failed to parse trace event:', e);
                    }
                };
                
                es.onerror = (error) => {
                    console.error('SSE error:', error);
                    connectionStatus.textContent = 'Disconnected';
                    connectionStatus.className = 'text-xs font-medium px-2 py-1 rounded-full bg-red-100 text-red-700';
                    
                    // Schedule reconnect with backoff (max 30 seconds)
                    const nextDelay = Math.min(reconnectDelay * 2, 30000);
                    console.log(`Retrying connection in ${reconnectDelay}ms...`);
                    
                    setTimeout(() => {
                        reconnectDelay = nextDelay;
                        connectToTraceStream();
                    }, reconnectDelay);
                };
                
                eventSource = es;
            } catch (error) {
                console.error('Failed to connect to trace stream:', error);
                connectionStatus.textContent = 'Connection Failed';
                connectionStatus.className = 'text-xs font-medium px-2 py-1 rounded-full bg-red-100 text-red-700';
            }
        }

        // Button handlers
        clearBtn.addEventListener('click', () => {
            isConnecting = false; // Stop reconnecting
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            traceWindow.innerHTML = '<div class="text-gray-500 italic text-center py-8">Console cleared. Waiting for new events...</div>';
            eventCount = 0;
            errorCount = 0;
            uniqueComponents.clear();
            allEvents = [];
            reconnectDelay = 5000; // Reset delay
            updateStats();
        });
        
        exportBtn.addEventListener('click', () => {
            const exportData = {
                generated: new Date().toISOString(),
                total_events: eventCount,
                components: Array.from(uniqueComponents),
                errors: errorCount,
                events: allEvents
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `admin-traces-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
        
        // Initialize
        isConnecting = true;
        connectToTraceStream();
    </script>
</body>
</html>
